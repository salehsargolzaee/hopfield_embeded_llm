seed: 42

# --- Data source (reused from ingestion pipeline) ---
source:
  type: "squad"
  path: "data/raw/"
  squad_split: "validation"
  max_articles: null

chunking:
  strategy: "semantic"
  max_chunk_tokens: 256
  overlap_tokens: 32
  min_chunk_tokens: 20

# --- Memory bank ---
memory:
  # Embedding model for the memory bank (not the LLM)
  embedding_model: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  output_dir: "data/memory/"

embedding:
  model_name: "BAAI/bge-base-en-v1.5"
  dimension: 768
  batch_size: 64
  device: "cuda"
  cache_dir: "data/embeddings/"

# --- LLM with Hopfield injection ---
model:
  # Qwen 2.5 3B Instruct — instruction-tuned so it can answer questions concisely.
  # Using 2.5 instead of 3.5 because 3.5 has a novel mixed linear/full
  # attention pattern that complicates manual layer injection.
  name: "Qwen/Qwen2.5-3B-Instruct"
  # Which transformer layers to inject memory at (0-indexed, 36 total).
  # Layer 8  = early (broad topic retrieval)
  # Layer 18 = middle (blend relevant docs)
  # Layer 30 = late (sharp fact lookup before generation)
  injection_layers: [8, 18, 30]
  # Multi-head attention over memory
  num_heads: 4
  # Hopfield update steps — the iterative energy minimization that makes
  # Hopfield different from standard attention. 0 = single-pass (no convergence).
  # 3 = three iterations of the update rule, allowing the query to converge
  # toward the nearest stored pattern.
  update_steps: 3
  # Inverse temperature β. Higher = sharper retrieval. Default library value
  # (1/sqrt(dim)) is too soft for 1000+ documents.
  scaling: 0.5

# --- Training ---
training:
  batch_size: 8
  num_epochs: 3
  lr: 2.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_seq_length: 256
  output_dir: "checkpoints/"
  log_every: 10
  save_every: 500
  diag_every: 50
  # Weight for auxiliary retrieval loss
  retrieval_loss_weight: 1.0
  # Phase 1: warm-up the router on retrieval only (no LLM forward pass)
  phase1_steps: 3000
  phase1_lr: 1.0e-3
  # Teacher forcing: fraction of phase 2 batches that use the correct document
  # Decays by 0.5x each epoch (0.5 → 0.25 → 0.125)
  teacher_forcing_ratio: 0.5
